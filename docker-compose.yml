services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      SUNO_API_KEY: ${SUNO_API_KEY}
      SUNO_CALLBACK_URL: ${SUNO_CALLBACK_URL:-http://localhost:8000/api/generate/callback/}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    environment:
      # Server-side URL — frontend container reaches backend via Docker network
      BACKEND_URL: http://backend:8000/api
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - backend

volumes:
  media:
